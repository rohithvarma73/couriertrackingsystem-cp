# H2 in-memory database for tests — no MySQL required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable the Thymeleaf cache for tests
spring.thymeleaf.cache=false

# Disable Liquibase/Flyway if present
spring.flyway.enabled=false
spring.liquibase.enabled=false

# Let the CommandLineRunner run in tests, since it checks if admin exists and is idempotent
# spring.autoconfigure.exclude=com.wip.config.DatabaseSeederConfig
