<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign in — Nexus</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <div class="auth-layout">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-mark"><i class="fa-solid fa-cube"></i></div>
                <h1>Nexus</h1>
                <p>Sign in to your account</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation"></i>
                Incorrect username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                <i class="fa-solid fa-check-circle"></i>
                You have been signed out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group mb-4">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Enter your username" required autofocus>
                    </div>
                </div>

                <div class="form-group mb-6">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Sign in <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <p class="text-center text-sm text-secondary mt-6">
                Don't have an account?
                <a th:href="@{/register}" style="font-weight:600; color:var(--purple);">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
