<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-section">
    <div class="detail-card">
        <h2 class="fw-bold mb-4">Search Results</h2>

        <div th:if="${trackingUpdates == null || #lists.isEmpty(trackingUpdates)}" class="alert alert-warning">
            No tracking updates found.
        </div>

        <div th:if="${trackingUpdates != null && !#lists.isEmpty(trackingUpdates)}" class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Update ID</th>
                    <th>Shipment ID</th>
                    <th>Tracking Number</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>Remarks</th>
                    <th>Created At</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${trackingUpdates}">
                    <td th:text="${t.updateId}">1</td>
                    <td th:text="${t.shipmentId}">1</td>
                    <td th:text="${t.trackingNumber}">TRK123</td>
                    <td th:text="${t.deliveryStatus}">In Transit</td>
                    <td th:text="${t.location}">Mumbai</td>
                    <td th:text="${t.remarks}">Delivered soon</td>
                    <td th:text="${t.createdAt != null ? #temporals.format(t.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">2026-06-18 12:00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
