<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Not Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card text-center">
        <h2 class="fw-bold text-danger" th:text="${errorTitle} ?: 'Parcel not found'"></h2>
        <p class="mt-3 mb-4" th:text="${errorMessage} ?: 'The parcel you requested does not exist or cannot be started for shipment.'"></p>

        <a th:href="@{/parcels}" class="btn btn-secondary">Back to Parcels</a>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
