<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access denied — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="error-layout">
            <div class="error-card">
                <span class="error-code" style="color: var(--danger);">403</span>
                <h2>Access denied</h2>
                <p>You don't have permission to view this page. Please contact an administrator if you think this is a mistake.</p>
                <div class="flex gap-3 justify-center">
                    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
                    <a th:href="javascript:history.back()" class="btn btn-secondary">Go back</a>
                </div>
            </div>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
