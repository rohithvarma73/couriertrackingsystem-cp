<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Restricted</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="card shadow-sm border-0 mx-auto text-center p-4" style="max-width: 650px;">
        <h2 class="text-danger fw-bold mb-3">Action Restricted</h2>
        <p class="mb-2">You do not have permission to perform this action.</p>
        <p class="text-muted mb-4">Only administrators can add, update, or delete records.</p>

        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/}" class="btn btn-primary">Go Home</a>
            <a th:href="@{/customers}" class="btn btn-outline-secondary">Back to Module</a>
        </div>
    </div>
</div>
</body>
</html>
