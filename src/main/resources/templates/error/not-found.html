<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Not found — Nexus</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="error-layout">
            <div class="error-card">
                <span class="error-code">404</span>
                <h2 th:text="${errorTitle != null} ? ${errorTitle} : 'Not found'">Not found</h2>
                <p th:text="${errorMessage != null} ? ${errorMessage} : 'The record you are looking for does not exist or has been removed.'">
                    The record you are looking for does not exist.
                </p>
                <div class="flex gap-3 justify-center">
                    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
                    <a href="javascript:history.back()" class="btn btn-secondary">Go back</a>
                </div>
            </div>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
