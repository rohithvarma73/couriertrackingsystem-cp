<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Action not allowed — Nexus</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="error-layout">
            <div class="error-card">
                <span style="font-size:4rem; color:var(--danger); display:block; margin-bottom:1rem;">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </span>
                <h2 th:text="${errorTitle != null} ? ${errorTitle} : 'Action not allowed'">Action not allowed</h2>
                <p th:text="${errorMessage != null} ? ${errorMessage} : 'This action cannot be completed right now.'">
                    This action cannot be completed.
                </p>
                <div class="flex gap-3 justify-center">
                    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
                    <a href="javascript:history.back()" class="btn btn-secondary">Go back</a>
                </div>
            </div>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
