<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Record not found — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="error-layout">
            <div class="error-card">
                <span class="error-code" style="color: var(--text-muted);">
                    <i class="fa-solid fa-box-open" style="font-size:4rem;"></i>
                </span>
                <h2>Record not found</h2>
                <p th:if="${errorMessage}" th:text="${errorMessage}">The record you're looking for could not be found.</p>
                <p th:unless="${errorMessage}">The parcel or shipment you're looking for doesn't exist.</p>
                <div class="flex gap-3 justify-center">
                    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
                    <a th:href="@{/parcels}" class="btn btn-secondary">My Parcels</a>
                </div>
            </div>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
