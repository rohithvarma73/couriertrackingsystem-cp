<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${parcelDto.parcelId == null} ? 'New parcel — Nexus' : 'Edit parcel — Nexus'">Parcel</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2 th:text="${parcelDto.parcelId == null} ? 'Book a parcel' : 'Edit parcel'">Parcel</h2>
                <p th:text="${parcelDto.parcelId == null}
                    ? 'Fill in the details below to book your parcel'
                    : 'Update the parcel details'"></p>
            </div>
            <div class="page-actions">
                <a th:href="@{/parcels}" class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
            </div>
        </div>

        <!-- Inline error from controller (e.g. customer not found, save failed) -->
        <div th:if="${errorMessage}" class="error-box" style="max-width:720px; margin-bottom:1.5rem;">
            <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
            <div class="error-box-body">
                <div class="error-box-title">Could not save parcel</div>
                <div class="error-box-message" th:text="${errorMessage}"></div>
            </div>
        </div>

        <div class="form-card">
            <form th:action="${parcelDto.parcelId == null} ? @{/parcels/save} : @{'/parcels/' + ${parcelDto.parcelId} + '/update'}"
                  th:object="${parcelDto}" method="post">
                <input type="hidden" th:field="*{parcelId}">

                <div class="form-grid">

                    <!-- Customer ID: shown to admin only. User's customer is auto-set server-side. -->
                    <div class="form-group" sec:authorize="hasRole('ADMIN')">
                        <label class="form-label">Customer ID</label>
                        <input type="number" class="form-input" th:field="*{customerId}"
                               placeholder="Enter customer ID" required>
                        <span th:if="${#fields.hasErrors('customerId')}" th:errors="*{customerId}" class="text-danger"></span>
                    </div>
                    <!-- Hidden for regular users (server-side enforced) -->
                    <input type="hidden" th:field="*{customerId}" sec:authorize="!hasRole('ADMIN')">

                    <div class="form-group">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" class="form-input" th:field="*{weight}"
                               placeholder="e.g. 2.5" min="0.1" step="0.1" required>
                        <span th:if="${#fields.hasErrors('weight')}" th:errors="*{weight}" class="text-danger"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Booking date</label>
                        <!--
                            th:min conflicts with th:field's value binding (Thymeleaf processes
                            both attrs and the min clobbers the rendered value). Use th:attr
                            to set min separately. Only enforce min=today on new parcels;
                            existing parcels may have a past date (don't break edit flow).
                        -->
                        <input type="date" class="form-input" th:field="*{bookingDate}"
                               th:attr="min=${parcelDto.parcelId == null ? today : null}">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Pickup address</label>
                        <textarea class="form-textarea" th:field="*{sourceAddress}"
                                  placeholder="Where should we collect the parcel from?"
                                  rows="2" required></textarea>
                        <span th:if="${#fields.hasErrors('sourceAddress')}" th:errors="*{sourceAddress}" class="text-danger"></span>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">Delivery address</label>
                        <textarea class="form-textarea" th:field="*{destinationAddress}"
                                  placeholder="Where should we deliver the parcel?"
                                  rows="2" required></textarea>
                        <span th:if="${#fields.hasErrors('destinationAddress')}" th:errors="*{destinationAddress}" class="text-danger"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check"></i>
                        <span th:text="${parcelDto.parcelId == null} ? 'Book parcel' : 'Save changes'">Save</span>
                    </button>
                    <a th:href="@{/parcels}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
