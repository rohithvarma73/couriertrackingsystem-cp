<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcel Form</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="fw-bold mb-4">Parcel Form</h2>

            <form th:action="${parcelDto.parcelId == null} ? @{/parcels/save} : @{'/parcels/' + ${parcelDto.parcelId} + '/update'}"
                  th:object="${parcelDto}" method="post">

                <input type="hidden" th:field="*{parcelId}">

                <div class="mb-3">
                    <label class="form-label">Customer ID</label>
                    <input type="number" class="form-control" th:field="*{customerId}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Weight</label>
                    <input type="text" class="form-control" th:field="*{weight}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Source Address</label>
                    <textarea class="form-control" rows="2" th:field="*{sourceAddress}" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Destination Address</label>
                    <textarea class="form-control" rows="2" th:field="*{destinationAddress}" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Booking Date</label>
                    <input type="date" class="form-control" th:field="*{bookingDate}" th:min="${today}">
                </div>

                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/parcels}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
