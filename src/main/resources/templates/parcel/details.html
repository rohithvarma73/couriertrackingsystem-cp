<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Parcel Details – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Parcel Details</h1>
            <p class="text-muted text-sm mt-2"
               th:text="'Parcel #' + ${parcel.parcelId}"></p>
        </div>
        <div class="page-actions flex gap-3">
            <a th:href="@{/parcels}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Back to List
            </a>

            <!-- Edit – admin only -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/parcels/{id}/edit(id=${parcel.parcelId})}"
               class="btn btn-primary">
                <i class="fa-solid fa-pen-to-square"></i> Edit
            </a>

            <!-- Start shipment – admin only, no existing shipment -->
            <a sec:authorize="hasRole('ADMIN')"
               th:if="${!parcel.shipmentAvailable}"
               th:href="@{/shipments/by-parcel/{id}(id=${parcel.parcelId})}"
               class="btn btn-success">
                <i class="fa-solid fa-truck"></i> Start Shipment
            </a>

            <!-- View shipment – if shipment exists -->
            <a th:if="${parcel.shipmentAvailable}"
               th:href="@{/shipments/{sid}(sid=${parcel.shipmentId})}"
               class="btn btn-secondary">
                <i class="fa-solid fa-magnifying-glass"></i> View Shipment
            </a>
        </div>
    </div>

    <!-- Main Info Card -->
    <div class="card mt-6">
        <div class="info-grid">

            <div class="info-item">
                <label>Parcel ID</label>
                <p class="text-mono" th:text="${parcel.parcelId}">—</p>
            </div>

            <div class="info-item">
                <label>Customer</label>
                <p th:text="${parcel.customerName}">—</p>
            </div>

            <div class="info-item">
                <label>Receiver Phone</label>
                <p th:text="${parcel.receiverPhone}">—</p>
            </div>

            <div class="info-item">
                <label>Weight</label>
                <p th:text="${parcel.weight + ' kg'}">—</p>
            </div>

            <div class="info-item">
                <label>Pickup Address</label>
                <p th:text="${parcel.sourceAddress}">—</p>
            </div>

            <div class="info-item">
                <label>Delivery Address</label>
                <p th:text="${parcel.destinationAddress}">—</p>
            </div>

            <div class="info-item">
                <label>Booking Date</label>
                <p th:text="${parcel.bookingDate}">—</p>
            </div>

            <div class="info-item">
                <label>Shipment Status</label>
                <p>
                    <span th:if="${parcel.shipmentAvailable}"
                          class="badge badge-success">Shipped</span>
                    <span th:unless="${parcel.shipmentAvailable}"
                          class="badge badge-neutral">Awaiting Shipment</span>
                </p>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
