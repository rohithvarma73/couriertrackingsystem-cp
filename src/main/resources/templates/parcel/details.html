<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold mb-0">Parcel Details</h2>
        </div>

        <hr>
        <p><strong>ID:</strong> <span th:text="${parcel.parcelId}"></span></p>
        <p><strong>Customer ID:</strong> <span th:text="${parcel.customerId}"></span></p>
        <p><strong>Customer Name:</strong> <span th:text="${parcel.customerName}"></span></p>
        <p><strong>Receiver Phone:</strong> <span th:text="${parcel.receiverPhone}"></span></p>
        <p><strong>Weight:</strong> <span th:text="${parcel.weight}"></span></p>
        <p><strong>Source Address:</strong> <span th:text="${parcel.sourceAddress}"></span></p>
        <p><strong>Destination Address:</strong> <span th:text="${parcel.destinationAddress}"></span></p>
        <p><strong>Booking Date:</strong> <span th:text="${parcel.bookingDate}"></span></p>

        <div class="mt-4 d-flex gap-2 flex-wrap">
            <a th:href="@{/parcels}" class="btn btn-secondary">Back</a>

            <!-- If shipment already exists -->
            <div th:if="${parcel.shipmentAvailable}">
                <a th:href="@{'/shipments/' + ${parcel.shipmentId}}" class="btn btn-info">View Shipment</a>
            </div>

            <!-- If no shipment yet, show Start Shipment for admin -->
            <div th:if="${!parcel.shipmentAvailable}">
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{'/shipments/by-parcel/' + ${parcel.parcelId}}"
                   class="btn btn-success">
                    Start Shipment
                </a>
            </div>

            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{'/parcels/' + ${parcel.parcelId} + '/edit'}"
               class="btn btn-warning text-dark">
                Edit
            </a>

            <form sec:authorize="hasRole('ADMIN')"
                  th:action="@{'/parcels/' + ${parcel.parcelId} + '/delete'}"
                  method="post"
                  style="display:inline;">
                <input type="hidden" name="_method" value="delete"/>
                <button type="submit"
                        class="btn btn-danger"
                        onclick="return confirm('Delete this parcel?');">
                    Delete
                </button>
            </form>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
