<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Parcel</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
	rel="stylesheet">
</head>
<body>
	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container page-section">
		<div class="form-card">
			<h2 class="fw-bold mb-3">Edit Parcel</h2>
			<form th:action="@{'/parcels/' + ${parcelDto.parcelId} + '/update'}"
				th:object="${parcelDto}" method="post">
				<div class="mb-3">
					<label class="form-label">Customer</label> <select
						class="form-select form-select-lg" th:field="*{customerId}">
						<option value="">Select customer</option>
						<option th:each="c : ${customers}" th:value="${c.customerId}"
							th:text="${c.customerName + ' - ' + c.phone}"></option>
					</select>
				</div>

				<div class="mb-3">
					<label class="form-label">Weight</label> <input type="number"
						step="0.01" class="form-control form-control-lg"
						th:field="*{weight}">
				</div>

				<div class="mb-3">
					<label class="form-label">Source Address</label> <input type="text"
						class="form-control form-control-lg" th:field="*{sourceAddress}">
				</div>

				<div class="mb-3">
					<label class="form-label">Destination Address</label> <input
						type="text" class="form-control form-control-lg"
						th:field="*{destinationAddress}">
				</div>

				<div class="mb-3">
					<label class="form-label">Booking Date</label> <input type="date"
						class="form-control form-control-lg" th:field="*{bookingDate}"
						th:min="${#temporals.format(#temporals.now(), 'yyyy-MM-dd')}">
				</div>

				<button type="submit" class="btn btn-primary btn-lg">Update
					Parcel</button>
				<a th:href="@{'/parcels/' + ${parcelDto.parcelId}}"
					class="btn btn-secondary btn-lg">Cancel</a>
			</form>
		</div>
	</div>

	<div th:replace="fragments/footer :: footer"></div>
	<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
