<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Parcels by Customer – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold"
                th:text="'Parcels for Customer #' + ${customerId}">Parcels</h1>
        </div>
        <div class="page-actions">
            <a th:href="@{/customers/{id}(id=${customerId})}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Back to Customer
            </a>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(parcels)}" class="empty-state mt-6">
        <div class="empty-state-icon">
            <i class="fa-solid fa-box-open"></i>
        </div>
        <p class="text-muted mt-4">No parcels found for this customer.</p>
    </div>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(parcels)}" class="table-wrapper mt-6">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Receiver</th>
                    <th>Weight (kg)</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Date</th>
                    <th>Shipped?</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="parcel : ${parcels}">
                    <td class="text-mono" th:text="${parcel.parcelId}">—</td>
                    <td th:text="${parcel.receiverPhone}">—</td>
                    <td th:text="${parcel.weight + ' kg'}">—</td>
                    <td th:text="${parcel.sourceAddress}">—</td>
                    <td th:text="${parcel.destinationAddress}">—</td>
                    <td th:text="${parcel.bookingDate}">—</td>
                    <td>
                        <span th:if="${parcel.shipmentAvailable}"
                              class="badge badge-success">Yes</span>
                        <span th:unless="${parcel.shipmentAvailable}"
                              class="badge badge-neutral">No</span>
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <a th:href="@{/parcels/{id}(id=${parcel.parcelId})}"
                               class="btn btn-sm btn-secondary">
                                <i class="fa-solid fa-eye"></i> View
                            </a>
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/parcels/{id}/edit(id=${parcel.parcelId})}"
                               class="btn btn-sm btn-primary">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </a>
                            <form sec:authorize="hasRole('ADMIN')"
                                  th:action="@{/parcels/{id}/delete(id=${parcel.parcelId})}"
                                  method="post"
                                  class="delete-form">
                                <button type="submit" class="btn btn-sm btn-danger">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
