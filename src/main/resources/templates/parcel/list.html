<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcels</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h2 class="fw-bold mb-1">Parcels</h2>
            <p class="text-muted mb-0">Manage parcel bookings and delivery details.</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/customers}" class="btn btn-outline-dark">Back</a>
            <a sec:authorize="hasAnyRole('USER','ADMIN')" th:href="@{/parcels/new}" class="btn btn-success">Add Parcel</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Weight</th>
                        <th>Source</th>
                        <th>Destination</th>
                        <th>Booking Date</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="parcel : ${parcels}">
                        <td th:text="${parcel.parcelId}"></td>
                        <td th:text="${parcel.customerName}"></td>
                        <td th:text="${parcel.receiverPhone}"></td>
                        <td th:text="${parcel.weight}"></td>
                        <td th:text="${parcel.sourceAddress}"></td>
                        <td th:text="${parcel.destinationAddress}"></td>
                        <td th:text="${parcel.bookingDate}"></td>
                        <td class="text-end">
                            <a th:href="@{'/parcels/' + ${parcel.parcelId}}" class="btn btn-info btn-sm text-white">View</a>
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{'/parcels/' + ${parcel.parcelId} + '/edit'}"
                               class="btn btn-warning btn-sm">Edit</a>
                            <form sec:authorize="hasRole('ADMIN')"
                                  th:action="@{'/parcels/' + ${parcel.parcelId} + '/delete'}"
                                  method="post" style="display:inline;">
                                <input type="hidden" name="_method" value="delete"/>
                                <button type="submit" class="btn btn-danger btn-sm"
                                        onclick="return confirm('Delete this parcel?');">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(parcels)}">
                        <td colspan="8" class="text-center text-muted py-3">No parcels found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
