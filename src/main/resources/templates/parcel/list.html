<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Parcels — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold" sec:authorize="hasRole('ADMIN')">All Parcels</h1>
            <h1 class="text-lg font-bold" sec:authorize="!hasRole('ADMIN')">My Parcels</h1>
        </div>
        <div class="page-actions">
            <a th:href="@{/parcels/new}" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Add Parcel
            </a>
        </div>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="success-box mb-6">
        <i class="fa-solid fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${infoMessage}" class="alert alert-info mb-6">
        <i class="fa-solid fa-circle-info"></i>
        <span th:text="${infoMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="error-box mb-6">
        <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
        <div class="error-box-body">
            <div class="error-box-title">Error</div>
            <div class="error-box-message" th:text="${errorMessage}"></div>
        </div>
    </div>

    <!-- Table or Empty State -->
    <div th:if="${#lists.isEmpty(parcels)}" class="empty-state mt-6">
        <div class="empty-state-icon">
            <i class="fa-solid fa-box-open"></i>
        </div>
        <p class="text-muted mt-4">No parcels yet.</p>
        <a th:href="@{/parcels/new}" class="btn btn-primary mt-4">
            <i class="fa-solid fa-plus"></i> Book Your First Parcel
        </a>
    </div>

    <div th:if="${!#lists.isEmpty(parcels)}" class="table-wrapper mt-6">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Receiver Phone</th>
                    <th>Weight (kg)</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Booked</th>
                    <th>Shipped?</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="parcel : ${parcels}">
                    <td class="text-mono" th:text="${parcel.parcelId}">—</td>
                    <td th:text="${parcel.customerName}">—</td>
                    <td th:text="${parcel.receiverPhone}">—</td>
                    <td th:text="${parcel.weight + ' kg'}">—</td>
                    <td th:text="${parcel.sourceAddress}">—</td>
                    <td th:text="${parcel.destinationAddress}">—</td>
                    <td th:text="${parcel.bookingDate}">—</td>
                    <td>
                        <span th:if="${parcel.shipmentAvailable}"
                              class="badge badge-success">Yes</span>
                        <span th:unless="${parcel.shipmentAvailable}"
                              class="badge badge-neutral">No</span>
                    </td>
                    <td>
                        <div class="flex gap-2">
                            <a th:href="@{/parcels/{id}(id=${parcel.parcelId})}"
                               class="btn btn-sm btn-secondary">
                                <i class="fa-solid fa-eye"></i> View
                            </a>
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/parcels/{id}/edit(id=${parcel.parcelId})}"
                               class="btn btn-sm btn-primary">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </a>
                            <form sec:authorize="hasRole('ADMIN')"
                                  th:action="@{/parcels/{id}/delete(id=${parcel.parcelId})}"
                                  method="post"
                                  class="delete-form">
                                <button type="submit" class="btn btn-sm btn-danger">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
