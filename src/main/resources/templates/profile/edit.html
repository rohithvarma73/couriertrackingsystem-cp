<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit profile — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2>Edit profile</h2>
                <p>Update your contact details</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/profile}" class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
            </div>
        </div>

        <!-- Inline error from controller -->
        <div th:if="${errorMessage}" class="error-box" style="max-width:720px; margin-bottom:1.5rem;">
            <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
            <div class="error-box-body">
                <div class="error-box-title">Could not save profile</div>
                <div class="error-box-message" th:text="${errorMessage}"></div>
            </div>
        </div>

        <div class="form-card">
            <form th:action="@{/profile/update}" th:object="${customerDto}" method="post">
                <input type="hidden" th:field="*{customerId}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input type="text" class="form-input" th:field="*{customerName}"
                               placeholder="Your full name" required>
                        <span th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" th:field="*{email}"
                               placeholder="your@email.com" required>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone number</label>
                        <input type="text" class="form-input" th:field="*{phone}"
                               placeholder="+91 98765 43210" required>
                        <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></span>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Address</label>
                        <textarea class="form-textarea" th:field="*{address}"
                                  placeholder="Your full address" rows="2" required></textarea>
                        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check"></i> Save changes
                    </button>
                    <a th:href="@{/profile}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
