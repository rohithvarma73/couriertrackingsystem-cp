<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar">
    <!-- Flash message carriers — read by app.js to show toasts after redirects -->
    <div th:if="${successMessage}" th:attr="data-flash-success=${successMessage}" style="display:none;"></div>
    <div th:if="${infoMessage}"    th:attr="data-flash-info=${infoMessage}"       style="display:none;"></div>
    <div th:if="${errorMessage != null and #strings.isEmpty(errorMessage) == false}"
         th:attr="data-flash-error=${errorMessage}"  style="display:none;"></div>

    <div class="container">
        <a th:href="@{/}" class="navbar-brand">
            <span class="brand-icon"><i class="fa-solid fa-cube"></i></span>
            Nexus
        </a>

        <ul class="navbar-nav">
            <!-- Not logged in -->
            <li sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="nav-link">Sign in</a>
            </li>
            <li sec:authorize="!isAuthenticated()">
                <a th:href="@{/register}" class="btn btn-primary btn-sm">Create account</a>
            </li>

            <!-- USER links -->
            <li sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                <a th:href="@{/dashboard}" class="nav-link">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
            </li>
            <li sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                <a th:href="@{/parcels}" class="nav-link">
                    <i class="fa-solid fa-box"></i> My Parcels
                </a>
            </li>
            <li sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                <a th:href="@{/shipments}" class="nav-link">
                    <i class="fa-solid fa-truck"></i> My Shipments
                </a>
            </li>
            <li sec:authorize="hasRole('USER') and !hasRole('ADMIN')">
                <a th:href="@{/tracking}" class="nav-link">
                    <i class="fa-solid fa-location-dot"></i> Track
                </a>
            </li>

            <!-- ADMIN links -->
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/dashboard}" class="nav-link">
                    <i class="fa-solid fa-gauge-high"></i> Dashboard
                </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/customers}" class="nav-link">Customers</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/parcels}" class="nav-link">Parcels</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/shipments}" class="nav-link">Shipments</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/tracking}" class="nav-link">Tracking</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/search}" class="nav-link">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </a>
            </li>

            <!-- User pill -->
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/profile}" class="user-pill" style="text-decoration:none;">
                    <div class="user-avatar"
                         th:text="${#strings.toUpperCase(#strings.substring(#authentication.name,0,1))}">U</div>
                    <span class="user-name" th:text="${#authentication.name}">User</span>
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-ghost btn-sm" title="Sign out">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </form>
            </li>
        </ul>
    </div>
</nav>
</body>
</html>
