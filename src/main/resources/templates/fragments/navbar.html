<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Courier Tracking System</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/customers}">Customers</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/parcels}">Parcels</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/shipments}">Shipments</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tracking}">Tracking</a></li>
            </ul>

            <form class="d-flex me-3 my-2 my-lg-0" th:action="@{/search}" method="get">
                <input class="form-control form-control-sm me-2"
                       type="search"
                       name="q"
                       th:value="${q}"
                       placeholder="Search customers, parcels, shipments, tracking updates..."
                       aria-label="Search">
                <button class="btn btn-outline-light btn-sm" type="submit">Search</button>
            </form>

            <div class="d-flex align-items-center gap-3" sec:authorize="isAuthenticated()">
                <span class="text-white small">
                    Welcome, <strong sec:authentication="name"></strong>
                    <span class="badge bg-info text-dark ms-2" sec:authentication="principal.authorities"></span>
                </span>

                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
