<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-1">Tracking</h2>
            <p class="text-muted mb-0">View tracking details by shipment.</p>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/shipments}" class="btn btn-outline-dark">Back</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Shipment ID</th>
                        <th>Tracking Number</th>
                        <th>Parcel ID</th>
                        <th>Current Location</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${shipments}">
                        <td th:text="${s.shipmentId}"></td>
                        <td th:text="${s.trackingNumber}"></td>
                        <td th:text="${s.parcelId}"></td>
                        <td th:text="${s.currentLocation}"></td>
                        <td class="text-end">
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{'/tracking/shipment/' + ${s.shipmentId}}">
                                View Updates
                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               class="btn btn-success btn-sm"
                               th:href="@{'/tracking/shipment/' + ${s.shipmentId} + '/new'}">
                                Add Update
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(shipments)}">
                        <td colspan="5" class="text-center text-muted py-3">No shipments found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
