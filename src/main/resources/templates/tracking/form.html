<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Add tracking update — Nexus</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Add Tracking Update</h1>
            <p class="text-muted text-sm mt-2">
                Shipment:
                <span class="text-mono font-semibold" th:text="${shipment.trackingNumber}">—</span>
            </p>
        </div>
        <div class="page-actions">
            <a th:href="@{/tracking/shipment/{id}(id=${shipment.shipmentId})}"
               class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Cancel
            </a>
        </div>
    </div>

    <!-- Error flash -->
    <div th:if="${errorMessage}" class="error-box mb-6">
        <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
        <div class="error-box-body">
            <div class="error-box-title">Error</div>
            <div class="error-box-message" th:text="${errorMessage}"></div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="form-card mt-6">
        <form th:action="@{/tracking/shipment/{id}/save(id=${shipment.shipmentId})}"
              th:object="${trackingUpdateDto}"
              method="post">

            <div class="form-grid">

                <!-- Location -->
                <div class="form-group col-span-2">
                    <label class="form-label" for="location">Location</label>
                    <input id="location"
                           type="text"
                           class="form-input"
                           th:field="*{location}"
                           placeholder="e.g. Mumbai Sorting Hub"
                           required/>
                    <span class="text-danger text-sm"
                          th:if="${#fields.hasErrors('location')}"
                          th:errors="*{location}"></span>
                </div>

                <!-- Status -->
                <div class="form-group">
                    <label class="form-label" for="deliveryStatus">Status</label>
                    <select id="deliveryStatus"
                            class="form-input"
                            th:field="*{deliveryStatus}">
                        <option value="">-- Select status --</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Out for Delivery">Out for Delivery</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Delayed">Delayed</option>
                        <option value="Pending">Pending</option>
                    </select>
                    <span class="text-danger text-sm"
                          th:if="${#fields.hasErrors('deliveryStatus')}"
                          th:errors="*{deliveryStatus}"></span>
                </div>

                <!-- Remarks -->
                <div class="form-group col-span-2">
                    <label class="form-label" for="remarks">Remarks <span class="text-muted">(optional)</span></label>
                    <textarea id="remarks"
                              class="form-textarea"
                              th:field="*{remarks}"
                              rows="3"
                              placeholder="Any additional notes about this update..."></textarea>
                    <span class="text-danger text-sm"
                          th:if="${#fields.hasErrors('remarks')}"
                          th:errors="*{remarks}"></span>
                </div>

            </div>

            <!-- Form Actions -->
            <div class="form-actions">
                <a th:href="@{/tracking/shipment/{id}(id=${shipment.shipmentId})}"
                   class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i> Save Update
                </button>
            </div>

        </form>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
