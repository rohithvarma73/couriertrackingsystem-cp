<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tracking Update</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="fw-bold mb-3">Add Tracking Update</h2>

            <div class="mb-4">
                <p class="mb-1"><strong>Shipment ID:</strong> <span th:text="${shipment.shipmentId}"></span></p>
                <p class="mb-1"><strong>Tracking Number:</strong> <span th:text="${shipment.trackingNumber}"></span></p>
                <p class="mb-0"><strong>Current Location:</strong> <span th:text="${shipment.currentLocation}"></span></p>
            </div>

            <form th:action="@{'/tracking/shipment/' + ${shipment.shipmentId} + '/save'}"
                  th:object="${trackingUpdateDto}" method="post">
                <div class="mb-3">
                    <label class="form-label">Delivery Status</label>
                    <select class="form-select" th:field="*{deliveryStatus}" required>
                        <option value="">Select status</option>
                        <option value="Booked">Booked</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Out for Delivery">Out for Delivery</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Delayed">Delayed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Current Location</label>
                    <input type="text" class="form-control" th:field="*{location}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Remarks</label>
                    <textarea class="form-control" rows="4" th:field="*{remarks}"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Save Update</button>
                <a class="btn btn-secondary" th:href="@{'/tracking/shipment/' + ${shipment.shipmentId}}">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
