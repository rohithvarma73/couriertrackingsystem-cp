<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tracking History – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Tracking History</h1>
            <p class="text-mono font-semibold text-accent mt-2"
               th:text="${shipment.trackingNumber}">—</p>
        </div>
        <div class="page-actions flex gap-3">
            <a th:href="@{/tracking}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/tracking/shipment/{id}/new(id=${shipment.shipmentId})}"
               class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Add Update
            </a>
        </div>
    </div>

    <!-- Shipment Overview Card -->
    <div class="card mt-6">
        <h2 class="font-semibold mb-4">Shipment Overview</h2>
        <div class="info-grid">
            <div class="info-item">
                <label>Current Location</label>
                <p th:text="${shipment.currentLocation}">—</p>
            </div>
            <div class="info-item">
                <label>Estimated Delivery</label>
                <p th:text="${shipment.estimatedDeliveryDate}">—</p>
            </div>
        </div>
    </div>

    <!-- Timeline or Empty State -->
    <div class="mt-6">

        <div th:if="${#lists.isEmpty(updates)}" class="empty-state">
            <div class="empty-state-icon">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </div>
            <p class="text-muted mt-4">No updates yet. Check back later.</p>
        </div>

        <div th:unless="${#lists.isEmpty(updates)}" class="timeline">

            <div th:each="u : ${updates}" class="timeline-item">

                <!-- Timeline Dot with status-based class -->
                <div th:if="${u.deliveryStatus == 'Delivered'}"
                     class="timeline-dot success">
                    <i class="fa-solid fa-check"></i>
                </div>
                <div th:if="${u.deliveryStatus == 'Delayed'}"
                     class="timeline-dot danger">
                    <i class="fa-solid fa-exclamation"></i>
                </div>
                <div th:unless="${u.deliveryStatus == 'Delivered' or u.deliveryStatus == 'Delayed'}"
                     class="timeline-dot active">
                    <i class="fa-solid fa-circle"></i>
                </div>

                <!-- Timeline Content -->
                <div class="timeline-content">

                    <div class="timeline-date" th:text="${u.createdAt}">—</div>

                    <div class="timeline-title" th:text="${u.location}">—</div>

                    <!-- Badge by status -->
                    <span th:if="${u.deliveryStatus == 'Delivered'}"
                          class="badge badge-success" th:text="${u.deliveryStatus}">Delivered</span>
                    <span th:if="${u.deliveryStatus == 'Delayed'}"
                          class="badge badge-danger" th:text="${u.deliveryStatus}">Delayed</span>
                    <span th:unless="${u.deliveryStatus == 'Delivered' or u.deliveryStatus == 'Delayed'}"
                          class="badge badge-info" th:text="${u.deliveryStatus}">In Transit</span>

                    <!-- Remarks -->
                    <div th:if="${u.remarks != null and !u.remarks.isEmpty()}"
                         class="timeline-body" th:text="${u.remarks}"></div>

                    <!-- Admin delete -->
                    <div sec:authorize="hasRole('ADMIN')" class="mt-2">
                        <form th:action="@{/tracking/update/{uid}/delete(uid=${u.updateId})}"
                              method="post"
                              class="delete-form">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </form>
                    </div>

                </div>

            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
