<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <h2 class="fw-bold mb-0">Shipment Tracking</h2>

                <div class="d-flex gap-2">
                    <a th:href="@{/tracking}" class="btn btn-outline-dark">Back</a>

                    <a sec:authorize="hasRole('ADMIN')"
                       class="btn btn-success"
                       th:href="@{'/tracking/shipment/' + ${shipment.shipmentId} + '/new'}">
                        Add Tracking Update
                    </a>
                </div>
            </div>

            <hr>
            <p><strong>Shipment ID:</strong> <span th:text="${shipment.shipmentId}"></span></p>
            <p><strong>Tracking Number:</strong> <span th:text="${shipment.trackingNumber}"></span></p>
            <p><strong>Parcel ID:</strong> <span th:text="${shipment.parcelId}"></span></p>
            <p><strong>Current Location:</strong> <span th:text="${shipment.currentLocation}"></span></p>
        </div>
    </div>

    <div th:if="${updates != null and !#lists.isEmpty(updates)}" class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Created At</th>
                    <th>Status</th>
                    <th>Location</th>
                    <th>Remarks</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u, stat : ${updates}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${u.createdAt}"></td>
                    <td th:text="${u.deliveryStatus}"></td>
                    <td th:text="${u.location}"></td>
                    <td th:text="${u.remarks}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${updates == null or #lists.isEmpty(updates)}" class="card shadow-sm">
        <div class="card-body text-center py-5">
            <h4 class="fw-bold mb-2">No tracking updates yet</h4>
            <p class="text-muted mb-4">
                This shipment has been created, but no tracking activity has been added yet.
            </p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a th:href="@{/tracking}" class="btn btn-outline-secondary">Back to Tracking</a>

                <a sec:authorize="hasRole('ADMIN')"
                   class="btn btn-success"
                   th:href="@{'/tracking/shipment/' + ${shipment.shipmentId} + '/new'}">
                    Add First Update
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
