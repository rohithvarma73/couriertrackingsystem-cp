<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Tracking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-section">
    <div class="form-card">
        <h2 class="fw-bold mb-3">Update Tracking</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Tracking ID</label>
                <input type="text" class="form-control form-control-lg" placeholder="Tracking ID">
            </div>
            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" class="form-control form-control-lg" placeholder="Current location">
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select form-select-lg">
                    <option>Booked</option>
                    <option>In Transit</option>
                    <option>Out for Delivery</option>
                    <option>Delivered</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Save Update</button>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
