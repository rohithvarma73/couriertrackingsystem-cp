<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="fw-bold mb-4"
                th:text="${shipmentDto.shipmentId == null} ? 'Shipment Form' : 'Edit Shipment'">
                Shipment Form
            </h2>

            <form th:action="${shipmentDto.shipmentId == null} ? @{/shipments/save} : @{'/shipments/' + ${shipmentDto.shipmentId} + '/update'}"
                  th:object="${shipmentDto}" method="post">

                <input type="hidden" th:field="*{shipmentId}"/>

                <div class="mb-3" th:if="${shipmentDto.shipmentId == null}">
                    <label class="form-label">Parcel ID</label>
                    <input type="number" class="form-control" th:field="*{parcelId}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Current Location</label>
                    <input type="text" class="form-control" th:field="*{currentLocation}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Shipment Date</label>
                    <input type="date" class="form-control" th:field="*{shipmentDate}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Estimated Delivery Date</label>
                    <input type="date" class="form-control" th:field="*{estimatedDeliveryDate}">
                </div>

                <button type="submit" class="btn btn-primary"
                        th:text="${shipmentDto.shipmentId == null} ? 'Save' : 'Update Shipment'">
                    Save
                </button>

                <a th:href="${shipmentDto.shipmentId == null} ? @{/shipments} : @{'/shipments/' + ${shipmentDto.shipmentId}}"
                   class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
