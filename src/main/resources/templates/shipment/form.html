<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${shipmentDto.shipmentId == null} ? 'New shipment — Nexus' : 'Edit shipment — Nexus'">Shipment</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2 th:text="${shipmentDto.shipmentId == null} ? 'New shipment' : 'Edit shipment'">Shipment</h2>
                <p th:text="${shipmentDto.shipmentId == null}
                    ? 'Enter the parcel ID to create a shipment and generate a tracking number'
                    : 'Update the current location and estimated delivery date'"></p>
            </div>
            <div class="page-actions">
                <a th:href="@{/shipments}" class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
            </div>
        </div>

        <!-- Inline error -->
        <div th:if="${errorMessage}" class="error-box" style="max-width:720px; margin-bottom:1.5rem;">
            <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
            <div class="error-box-body">
                <div class="error-box-title">Could not save shipment</div>
                <div class="error-box-message" th:text="${errorMessage}"></div>
            </div>
        </div>

        <div class="form-card">
            <form th:action="${shipmentDto.shipmentId == null} ? @{/shipments/save} : @{'/shipments/' + ${shipmentDto.shipmentId} + '/update'}"
                  th:object="${shipmentDto}" method="post">
                <input type="hidden" th:field="*{shipmentId}">

                <div class="form-grid">
                    <!-- New shipment: pick a parcel -->
                    <div class="form-group full-width" th:if="${shipmentDto.shipmentId == null}">
                        <label class="form-label">Parcel ID</label>
                        <input type="number" class="form-input" th:field="*{parcelId}"
                               placeholder="Enter the parcel ID to ship" required>
                        <span class="text-sm text-muted" style="margin-top:.3rem; display:block;">
                            The parcel must exist and must not already have a shipment.
                        </span>
                    </div>

                    <!-- Edit shipment: update location + dates -->
                    <div class="form-group full-width" th:if="${shipmentDto.shipmentId != null}">
                        <label class="form-label">Current location</label>
                        <input type="text" class="form-input" th:field="*{currentLocation}"
                               placeholder="e.g. Mumbai Sorting Facility" required>
                        <span th:if="${#fields.hasErrors('currentLocation')}" th:errors="*{currentLocation}" class="text-danger"></span>
                    </div>
                    <div class="form-group" th:if="${shipmentDto.shipmentId != null}">
                        <label class="form-label">Shipment date</label>
                        <input type="date" class="form-input" th:field="*{shipmentDate}">
                    </div>
                    <div class="form-group" th:if="${shipmentDto.shipmentId != null}">
                        <label class="form-label">Estimated delivery</label>
                        <input type="date" class="form-input" th:field="*{estimatedDeliveryDate}" required>
                        <span th:if="${#fields.hasErrors('estimatedDeliveryDate')}" th:errors="*{estimatedDeliveryDate}" class="text-danger"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check"></i>
                        <span th:text="${shipmentDto.shipmentId == null} ? 'Create shipment' : 'Save changes'">Save</span>
                    </button>
                    <a th:href="@{/shipments}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
