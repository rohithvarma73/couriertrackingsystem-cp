<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <h2 class="fw-bold mb-4">Shipment Form</h2>

        <form th:action="${shipmentDto.shipmentId == null} ? @{/shipments/save} : @{'/shipments/' + ${shipmentDto.shipmentId} + '/update'}"
              th:object="${shipmentDto}"
              method="post">

            <input type="hidden" th:field="*{shipmentId}">

            <div class="mb-3">
                <label class="form-label">Parcel ID</label>
                <input type="number" class="form-control" th:field="*{parcelId}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Location</label>
                <input type="text" class="form-control" th:field="*{currentLocation}">
            </div>

            <div class="mb-3">
                <label class="form-label">Shipment Date</label>
                <input type="date" class="form-control" th:field="*{shipmentDate}" th:min="${today}">
            </div>

            <div class="mb-3">
                <label class="form-label">Estimated Delivery Date</label>
                <input type="date" class="form-control" th:field="*{estimatedDeliveryDate}" th:min="${today}">
            </div>

            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/shipments}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
