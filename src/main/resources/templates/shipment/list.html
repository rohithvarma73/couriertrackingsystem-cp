<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Shipments — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Shipments</h1>
        </div>
        <div class="page-actions">
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/shipments/new}"
               class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> New Shipment
            </a>
        </div>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="success-box mb-6">
        <i class="fa-solid fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${infoMessage}" class="alert alert-info mb-6">
        <i class="fa-solid fa-circle-info"></i>
        <span th:text="${infoMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="error-box mb-6">
        <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
        <div class="error-box-body">
            <div class="error-box-title">Error</div>
            <div class="error-box-message" th:text="${errorMessage}"></div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(shipments)}" class="empty-state mt-6">
        <div class="empty-state-icon">
            <i class="fa-solid fa-truck"></i>
        </div>
        <p class="text-muted mt-4">No shipments yet.</p>
    </div>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(shipments)}" class="table-wrapper mt-6">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tracking #</th>
                    <th>Customer</th>
                    <th>Current Location</th>
                    <th>Est. Delivery</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="shipment : ${shipments}">
                    <td class="text-mono" th:text="${shipment.shipmentId}">—</td>
                    <td class="text-mono" th:text="${shipment.trackingNumber}">—</td>
                    <td th:text="${shipment.customerName}">—</td>
                    <td th:text="${shipment.currentLocation}">—</td>
                    <td th:text="${shipment.estimatedDeliveryDate}">—</td>
                    <td>
                        <div class="flex gap-2">
                            <a th:href="@{/shipments/{id}(id=${shipment.shipmentId})}"
                               class="btn btn-sm btn-secondary">
                                <i class="fa-solid fa-eye"></i> View
                            </a>
                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/shipments/{id}/edit(id=${shipment.shipmentId})}"
                               class="btn btn-sm btn-primary">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </a>
                            <a th:href="@{/tracking/shipment/{id}(id=${shipment.shipmentId})}"
                               class="btn btn-sm btn-secondary">
                                <i class="fa-solid fa-location-dot"></i> Track
                            </a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

</body>
</html>
