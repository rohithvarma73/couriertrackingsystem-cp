<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-1">Shipments</h2>
            <p class="text-muted mb-0">Track shipment creation and movement details.</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/parcels}" class="btn btn-outline-dark">Back</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/shipments/new}"
               class="btn btn-success">Add Shipment</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Parcel ID</th>
                        <th>Tracking Number</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Shipment Date</th>
                        <th>Current Location</th>
                        <th>Estimated Delivery</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="shipment : ${shipments}">
                        <td th:text="${shipment.shipmentId}"></td>
                        <td th:text="${shipment.parcelId}"></td>
                        <td th:text="${shipment.trackingNumber}"></td>
                        <td th:text="${shipment.customerName}"></td>
                        <td th:text="${shipment.receiverPhone}"></td>
                        <td th:text="${shipment.shipmentDate}"></td>
                        <td th:text="${shipment.currentLocation}"></td>
                        <td th:text="${shipment.estimatedDeliveryDate}"></td>
                        <td class="text-end">
                            <a th:href="@{'/shipments/' + ${shipment.shipmentId}}"
                               class="btn btn-info btn-sm text-white">View</a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{'/shipments/' + ${shipment.shipmentId} + '/edit'}"
                               class="btn btn-warning btn-sm">Edit</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(shipments)}">
                        <td colspan="9" class="text-center text-muted py-3">No shipments found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
