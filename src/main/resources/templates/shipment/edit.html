<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Shipment</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
	rel="stylesheet">
</head>
<body>
	<div th:replace="fragments/navbar :: navbar"></div>

	<div class="container page-section">
		<div class="form-card">
			<h2 class="fw-bold mb-3">Edit Shipment</h2>
			<form
				th:action="@{'/shipments/' + ${shipmentDto.shipmentId} + '/update'}"
				th:object="${shipmentDto}" method="post">
				<div class="mb-3">
					<label class="form-label">Current Location</label> <input
						type="text" class="form-control form-control-lg"
						th:field="*{currentLocation}">
				</div>
				<div class="mb-3">
					<label class="form-label">Shipment Date</label> <input type="date"
						class="form-control form-control-lg" th:field="*{shipmentDate}"
						th:min="${#temporals.format(#temporals.now(), 'yyyy-MM-dd')}">
				</div>

				<div class="mb-3">
					<label class="form-label">Estimated Delivery Date</label> <input
						type="date" class="form-control form-control-lg"
						th:field="*{estimatedDeliveryDate}"
						th:min="${#temporals.format(#temporals.now(), 'yyyy-MM-dd')}">
				</div>
				<button type="submit" class="btn btn-primary btn-lg">Update
					Shipment</button>
				<a th:href="@{'/shipments/' + ${shipmentDto.shipmentId}}"
					class="btn btn-secondary btn-lg">Cancel</a>
			</form>
		</div>
	</div>

	<div th:replace="fragments/footer :: footer"></div>
	<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
