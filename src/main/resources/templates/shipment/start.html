<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Shipment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <h2 class="fw-bold mb-3">Start Shipment</h2>

        <div th:if="${shipmentAlreadyExists}" class="alert alert-warning">
            <h5 class="mb-2">Shipment already started</h5>
            <p class="mb-3">This parcel already has a shipment.</p>
            <a th:href="@{'/shipments/' + ${existingShipment.shipmentId}}" class="btn btn-info">View Shipment</a>
            <a th:href="@{'/parcels/' + ${parcelId}}" class="btn btn-outline-dark ms-2">Back to Parcel</a>
        </div>

        <div th:unless="${shipmentAlreadyExists}">
            <p><strong>Parcel ID:</strong> <span th:text="${parcel.parcelId}"></span></p>
            <p><strong>Customer:</strong> <span th:text="${parcel.customerName}"></span></p>
            <p><strong>Receiver Phone:</strong> <span th:text="${parcel.receiverPhone}"></span></p>
            <p><strong>Source:</strong> <span th:text="${parcel.sourceAddress}"></span></p>
            <p><strong>Destination:</strong> <span th:text="${parcel.destinationAddress}"></span></p>

            <form th:action="@{'/shipments/start/' + ${parcelId}}" method="post">
                <button type="submit" class="btn btn-success btn-lg">Start Shipment</button>
                <a th:href="@{'/parcels/' + ${parcelId}}" class="btn btn-outline-dark ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>

</body>
</html>
