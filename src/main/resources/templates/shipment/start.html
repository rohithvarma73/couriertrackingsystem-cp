<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Shipment</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <h2 class="fw-bold mb-3">Start Shipment</h2>
        <p><strong>Parcel ID:</strong> <span th:text="${parcel.parcelId}"></span></p>
        <p><strong>Customer:</strong> <span th:text="${parcel.customerName}"></span></p>
        <p><strong>Receiver Phone:</strong> <span th:text="${parcel.receiverPhone}"></span></p>
        <p><strong>Source:</strong> <span th:text="${parcel.sourceAddress}"></span></p>
        <p><strong>Destination:</strong> <span th:text="${parcel.destinationAddress}"></span></p>

        <a class="btn btn-success btn-lg"
           th:href="@{'/shipments/start/' + ${parcelId}}">
            Create Shipment
        </a>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
