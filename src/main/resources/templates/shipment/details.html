<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shipment Details – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Shipment Details</h1>
            <p class="text-muted text-sm mt-2"
               th:text="'Shipment #' + ${shipment.shipmentId}"></p>
        </div>
        <div class="page-actions flex gap-3">
            <a th:href="@{/shipments}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
            <a th:href="@{/tracking/shipment/{id}(id=${shipment.shipmentId})}"
               class="btn btn-secondary">
                <i class="fa-solid fa-location-dot"></i> Track This Shipment
            </a>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/shipments/{id}/edit(id=${shipment.shipmentId})}"
               class="btn btn-primary">
                <i class="fa-solid fa-pen-to-square"></i> Edit
            </a>
        </div>
    </div>

    <!-- Main Info Card -->
    <div class="card mt-6">
        <div class="info-grid">

            <div class="info-item">
                <label>Shipment ID</label>
                <p class="text-mono" th:text="${shipment.shipmentId}">—</p>
            </div>

            <div class="info-item">
                <label>Parcel ID</label>
                <p>
                    <a class="text-mono text-primary"
                       th:href="@{/parcels/{id}(id=${shipment.parcelId})}"
                       th:text="${shipment.parcelId}">—</a>
                </p>
            </div>

            <div class="info-item col-span-2">
                <label>Tracking Number</label>
                <p class="tracking-number" th:text="${shipment.trackingNumber}">—</p>
            </div>

            <div class="info-item">
                <label>Customer Name</label>
                <p th:text="${shipment.customerName}">—</p>
            </div>

            <div class="info-item">
                <label>Receiver Phone</label>
                <p th:text="${shipment.receiverPhone}">—</p>
            </div>

            <div class="info-item">
                <label>Current Location</label>
                <p th:text="${shipment.currentLocation}">—</p>
            </div>

            <div class="info-item">
                <label>Shipment Date</label>
                <p th:text="${shipment.shipmentDate}">—</p>
            </div>

            <div class="info-item">
                <label>Estimated Delivery Date</label>
                <p th:text="${shipment.estimatedDeliveryDate}">—</p>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
