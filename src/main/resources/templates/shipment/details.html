<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold mb-0">Shipment Details</h2>
            <a th:href="@{/shipments}" class="btn btn-outline-dark">Back</a>
        </div>

        <hr>
        <p><strong>Shipment ID:</strong> <span th:text="${shipment.shipmentId}"></span></p>
        <p><strong>Tracking Number:</strong> <span th:text="${shipment.trackingNumber}"></span></p>
        <p><strong>Parcel ID:</strong> <span th:text="${shipment.parcelId}"></span></p>
        <p><strong>Customer Name:</strong> <span th:text="${shipment.customerName}"></span></p>
        <p><strong>Receiver Phone:</strong> <span th:text="${shipment.receiverPhone}"></span></p>
        <p><strong>Shipment Date:</strong> <span th:text="${shipment.shipmentDate}"></span></p>
        <p><strong>Current Location:</strong> <span th:text="${shipment.currentLocation}"></span></p>
        <p><strong>Estimated Delivery:</strong> <span th:text="${shipment.estimatedDeliveryDate}"></span></p>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
