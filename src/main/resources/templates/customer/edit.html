<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="form-card">
        <h2 class="fw-bold mb-3">Edit Customer</h2>
        <form th:action="@{'/customers/' + ${customerDto.customerId} + '/update'}"
              th:object="${customerDto}" method="post">
            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" class="form-control form-control-lg" th:field="*{customerName}">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control form-control-lg" th:field="*{email}">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control form-control-lg" th:field="*{phone}">
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" class="form-control form-control-lg" th:field="*{address}">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Update Customer</button>
            <a th:href="@{'/customers/' + ${customerDto.customerId}}" class="btn btn-secondary btn-lg">Cancel</a>
        </form>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
