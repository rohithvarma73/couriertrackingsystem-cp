<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cannot Delete Customer – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-8 mb-8">

    <div class="error-layout">
        <div class="error-card">

            <!-- Icon -->
            <div class="text-center mb-4">
                <i class="fa-solid fa-triangle-exclamation text-danger"
                   style="font-size: 3rem;"></i>
            </div>

            <!-- Error Code / Title -->
            <div class="error-code text-center">Cannot Delete Customer</div>

            <!-- Dynamic error message -->
            <p class="text-center text-muted mt-4 mb-4" th:text="${errorMessage}">
                This customer has existing parcels.
            </p>

            <!-- Explanation -->
            <p class="text-center text-sm text-secondary mb-6">
                Delete or reassign all parcels for this customer before removing the customer record.
            </p>

            <!-- Actions -->
            <div class="flex justify-center gap-3">
                <a th:href="@{/customers}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> Back to Customers
                </a>
                <a th:href="@{/parcels}" class="btn btn-primary">
                    <i class="fa-solid fa-box"></i> View Parcels
                </a>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
