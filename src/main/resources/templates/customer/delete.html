<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Customer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="card shadow-sm mx-auto border-danger" style="max-width: 700px;">
        <div class="card-body p-4">
            <div class="d-flex align-items-center mb-3">
                <i class="fa-solid fa-triangle-exclamation text-danger fs-2 me-3"></i>
                <div>
                    <h2 class="fw-bold mb-1">Customer cannot be deleted</h2>
                    <p class="text-muted mb-0">This customer is linked to one or more parcels.</p>
                </div>
            </div>

            <hr>

            <div class="alert alert-danger mb-4" role="alert">
                <span th:text="${errorMessage}">
                    Cannot delete customer because parcels exist for this customer.
                </span>
            </div>

            <p class="mb-4">
                Delete or reassign the related parcels first, then try deleting the customer again.
            </p>

            <div class="d-flex gap-2 flex-wrap">
                <a th:href="@{/customers}" class="btn btn-secondary">
                    Back to Customers
                </a>
                <a th:href="@{/parcels}" class="btn btn-outline-primary">
                    View Parcels
                </a>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
