<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Customer — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2 th:text="${customerDto.customerId == null} ? 'Add customer' : 'Edit customer'">Customer form</h2>
                <p th:text="${customerDto.customerId == null} ? 'Fill in the customer details below' : 'Update this customer\'s information'"></p>
            </div>
            <div class="page-actions">
                <a th:href="${customerDto.customerId == null} ? @{/customers} : @{'/customers/' + ${customerDto.customerId}}"
                   class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left"></i> Cancel
                </a>
            </div>
        </div>

        <!-- Error flash -->
        <div th:if="${errorMessage}" class="error-box mb-6">
            <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
            <div class="error-box-body">
                <div class="error-box-title">Error</div>
                <div class="error-box-message" th:text="${errorMessage}"></div>
            </div>
        </div>

        <div class="form-card">
            <form th:action="${customerDto.customerId == null} ? @{/customers/save} : @{'/customers/' + ${customerDto.customerId} + '/update'}"
                  th:object="${customerDto}" method="post">
                <input type="hidden" th:field="*{customerId}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input type="text" class="form-input" th:field="*{customerName}"
                               placeholder="e.g. John Doe" required>
                        <span th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" th:field="*{email}"
                               placeholder="john@example.com" required>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone number</label>
                        <input type="tel" class="form-input" th:field="*{phone}"
                               placeholder="e.g. 9876543210"
                               pattern="[0-9]{10}"
                               maxlength="10"
                               title="Enter exactly 10 digits, no spaces or dashes"
                               required>
                        <span class="form-hint">10 digits only, no spaces or dashes</span>
                        <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></span>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Address</label>
                        <textarea class="form-textarea" th:field="*{address}"
                                  placeholder="Full address" rows="2" required></textarea>
                        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check"></i>
                        <span th:text="${customerDto.customerId == null} ? 'Save customer' : 'Save changes'">Save</span>
                    </button>
                    <a th:href="${customerDto.customerId == null} ? @{/customers} : @{'/customers/' + ${customerDto.customerId}}"
                       class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
