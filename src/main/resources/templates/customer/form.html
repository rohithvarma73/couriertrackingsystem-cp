<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="fw-bold mb-4"
                th:text="${customerDto.customerId == null} ? 'Add Customer' : 'Edit Customer'">
                Customer Form
            </h2>

            <form th:action="${customerDto.customerId == null} ? @{/customers/save} : @{'/customers/' + ${customerDto.customerId} + '/update'}"
                  th:object="${customerDto}" method="post">

                <input type="hidden" th:field="*{customerId}">

                <div class="mb-3">
                    <label class="form-label">Customer Name</label>
                    <input type="text" class="form-control" th:field="*{customerName}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" th:field="*{phone}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="3" th:field="*{address}" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary"
                        th:text="${customerDto.customerId == null} ? 'Save' : 'Update'">
                    Save
                </button>

                <a th:href="${customerDto.customerId == null} ? @{/customers} : @{'/customers/' + ${customerDto.customerId}}"
                   class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
