<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Details – Nexus Logistics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-6 mb-8">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="text-lg font-bold">Customer Details</h1>
            <p class="text-muted text-sm mt-2"
               th:text="'Record for customer #' + ${customer.customerId}"></p>
        </div>
        <div class="page-actions flex gap-3">
            <a th:href="@{/customers}" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left"></i> Back to Customers
            </a>
            <a th:href="@{/parcels/by-customer/{id}(id=${customer.customerId})}"
               class="btn btn-secondary">
                <i class="fa-solid fa-box"></i> View Parcels
            </a>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/customers/{id}/edit(id=${customer.customerId})}"
               class="btn btn-primary">
                <i class="fa-solid fa-pen-to-square"></i> Edit
            </a>
        </div>
    </div>

    <!-- Main Info Card -->
    <div class="card mt-6">
        <div class="info-grid">

            <div class="info-item">
                <label>Customer ID</label>
                <p class="text-mono" th:text="${customer.customerId}">—</p>
            </div>

            <div class="info-item">
                <label>Full Name</label>
                <p th:text="${customer.customerName}">—</p>
            </div>

            <div class="info-item">
                <label>Email</label>
                <p th:text="${customer.email}">—</p>
            </div>

            <div class="info-item">
                <label>Phone Number</label>
                <p th:text="${customer.phone}">—</p>
            </div>

            <div class="info-item col-span-2">
                <label>Address</label>
                <p th:text="${customer.address}">—</p>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>
</html>
