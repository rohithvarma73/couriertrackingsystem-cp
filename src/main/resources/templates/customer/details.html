<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container page-section">
    <div class="detail-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold mb-0">Customer Details</h2>
            
            <div class="d-flex gap-2">
                <a th:href="@{/customers}" class="btn btn-outline-dark">Back</a>
                <a th:href="@{'/parcels/by-customer/' + ${customer.customerId}}" class="btn btn-info">View Parcels</a>
            </div>
        </div>

        <hr>
        <p><strong>ID:</strong> <span th:text="${customer.customerId}"></span></p>
        <p><strong>Name:</strong> <span th:text="${customer.customerName}"></span></p>
        <p><strong>Email:</strong> <span th:text="${customer.email}"></span></p>
        <p><strong>Phone:</strong> <span th:text="${customer.phone}"></span></p>
        <p><strong>Address:</strong> <span th:text="${customer.address}"></span></p>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
<div th:replace="fragments/scripts :: scripts"></div>
</body>
</html>
