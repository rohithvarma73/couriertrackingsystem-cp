<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Customers — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <main class="container">
        <div class="page-header">
            <div class="page-header-left">
                <h2>Customers</h2>
                <p>All registered customers</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/dashboard}" class="btn btn-secondary btn-sm">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
                <a th:href="@{/customers/new}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">
                    <i class="fa-solid fa-plus"></i> Add customer
                </a>
            </div>
        </div>

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="success-box mb-6">
            <i class="fa-solid fa-check-circle"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${infoMessage}" class="alert alert-info mb-6">
            <i class="fa-solid fa-circle-info"></i>
            <span th:text="${infoMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="error-box mb-6">
            <span class="error-box-icon"><i class="fa-solid fa-circle-exclamation"></i></span>
            <div class="error-box-body">
                <div class="error-box-title">Error</div>
                <div class="error-box-message" th:text="${errorMessage}"></div>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="customer : ${customers}">
                        <td th:text="${customer.customerId}" class="text-mono"></td>
                        <td th:text="${customer.customerName}" class="primary"></td>
                        <td th:text="${customer.email}"></td>
                        <td th:text="${customer.phone}"></td>
                        <td th:text="${customer.address}"></td>
                        <td style="text-align:right;">
                            <div class="flex gap-2 justify-end">
                                <a th:href="@{'/customers/' + ${customer.customerId}}" class="btn btn-secondary btn-sm">View</a>
                                <a th:href="@{'/customers/' + ${customer.customerId} + '/edit'}" class="btn btn-secondary btn-sm" sec:authorize="hasRole('ADMIN')">Edit</a>
                                <form th:action="@{'/customers/' + ${customer.customerId} + '/delete'}" method="post" class="delete-form" sec:authorize="hasRole('ADMIN')">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(customers)}">
                        <td colspan="6">
                            <div class="empty-state">
                                <div class="empty-state-icon"><i class="fa-solid fa-users-slash"></i></div>
                                <p>No customers found.</p>
                                <a th:href="@{/customers/new}" class="btn btn-primary btn-sm" sec:authorize="hasRole('ADMIN')">Add the first customer</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
