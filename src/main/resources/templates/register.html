<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create account — Nexus Logistics</title>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <div class="auth-layout" style="align-items: flex-start; padding-top: 3rem;">
        <div class="auth-card" style="max-width: 560px;">
            <div class="auth-logo">
                <div class="auth-logo-mark"><i class="fa-solid fa-cube"></i></div>
                <h1>Create your account</h1>
                <p>Fill in your details to get started</p>
            </div>

            <div th:if="${param.success}" class="alert alert-success mb-4">
                <i class="fa-solid fa-check-circle"></i>
                Account created! <a th:href="@{/login}" style="font-weight:600; color:inherit;">Sign in now</a>
            </div>

            <form th:action="@{/register}" th:object="${registerDto}" method="post">

                <p class="section-label">Account details</p>

                <div class="form-grid mb-6">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" th:field="*{username}" class="form-input"
                               placeholder="Choose a username" required>
                        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-input"
                               placeholder="your@email.com" required>
                        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" th:field="*{password}" class="form-input"
                               placeholder="At least 6 characters" required>
                        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm password</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-input"
                               placeholder="Repeat your password" required>
                        <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="text-danger"></span>
                    </div>
                </div>

                <p class="section-label">Personal details</p>

                <div class="form-grid mb-6">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-input"
                               placeholder="e.g. John Doe" required>
                        <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger"></span>
                    </div>
                    <div class="form-group">
                        <label for="phone" class="form-label">Phone number</label>
                        <input type="text" id="phone" th:field="*{phone}" class="form-input"
                               placeholder="e.g. +91 98765 43210" required>
                        <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-danger"></span>
                    </div>
                    <div class="form-group full-width">
                        <label for="address" class="form-label">Address</label>
                        <textarea id="address" th:field="*{address}" class="form-textarea" rows="2"
                                  placeholder="Your full address" required></textarea>
                        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-user-plus"></i> Create account
                </button>
            </form>

            <p class="text-center text-sm text-secondary mt-6">
                Already have an account?
                <a th:href="@{/login}" style="font-weight:600;">Sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
